<title>仿 Yahoo 標籤式垂直廣告輪播</title>
<style type="text/css">
	a img {
		border: none;
		vertical-align: middle;
	}
	#adblock {
		overflow: hidden;
		width: 320px;	/* 廣告圖片的寬 + 選單圖片最大的寬 */
		height: 390px;	/* 廣告圖片的高 */
		border: 1px solid #ccc;
		position: relative;
	}
	#adblock ul, #adblock li {
		margin: 0;
		padding: 0;
		list-style: none;
	}
	#adblock ul.showbox, #adblock ul.link {
		position: absolute;
	}
	#adblock ul.showbox li a {
		display: block;
		height: 390px;	/* 廣告圖片的高 */
	}
	#adblock ul.showbox {
		right: 0;
	}
	#adblock ul.link li a {
		display: block;
		width: 100px;	/* 滑鼠未移入時的選單圖片寬 */
		height: 30px;	/* 選單圖片的高 */
		position: absolute;
		text-indent:20px;
		line-height: 30px;
		/*background-color: #ccc;*/
		background-image:url(menu1.gif);
	}
	#adblock ul.link li a.selected {
		width: 110px;	/* 滑鼠移入時的選單圖片寬 */		
		background-image:url(menu2.gif);
	}
</style>
<script type="text/javascript">
	$(function(){
		// 大廣告圖片的高度及動畫時間
		var adHeight = 390,
			animateSpeed = 200;
		$('#adblock ul.link li a').each(function(i){
			// 把選單排好位置
			$(this).css('top', i * 30);
		}).mouseover(function(){
			var $this = $(this),
				// 找出目前 li 是在選單中的第幾個(jQuery 1.4)
				no = $this.parent().index();
			
			// 先移除有 .selected 的超連結的樣式
			$('#adblock ul.link li a.selected').removeClass('selected');
			// 再把目前點擊到的超連結加上 .selected
			$this.addClass('selected');
			
			// 把 ul.showbox 的 top 移到相對應的高度
			$('#adblock ul.showbox').stop().animate({
				top: adHeight * no * -1
			}, animateSpeed);
		}).focus(function(){
			$(this).blur();
		}).eq(0).mouseover();
	});
</script>
</head>
